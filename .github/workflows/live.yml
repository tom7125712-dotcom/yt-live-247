name: YouTube 24/7 Live Stream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"

# 新增：並行控制規則，確保新任務啟動時自動關閉舊任務，完美交接
concurrency:
  group: "yt-live"
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: 取得專案檔案
        uses: actions/checkout@v3

      - name: 安裝 FFmpeg 影音串流工具
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 啟動直播推流至 YouTube
        run: |
          ffmpeg -re -loop 1 -framerate 30 -i image.jpg -stream_loop -1 -i music.mp3 -c:v libx264 -preset veryfast -b:v 2500k -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
